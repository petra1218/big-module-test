<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>模型识别验证服务</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f5f7fa; color: #333; }
    .topbar { background: #1f2d3d; color: #fff; padding: 12px 20px; font-size: 18px; font-weight: 600; display: flex; align-items: center; }
    .layout { display: flex; gap: 12px; padding: 12px; }
    .col { background: #fff; border-radius: 8px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .col-config { width: 320px; flex: none; }
    .col-list { width: 280px; flex: none; }
    .col-detail { flex: 1; min-width: 0; }
    h3 { margin: 0 0 10px; font-size: 15px; border-left: 3px solid #2d8cf0; padding-left: 8px; }
    .field { margin-bottom: 8px; }
    .field label { display: block; font-size: 12px; color: #666; margin-bottom: 3px; }
    .field input, .field select { width: 100%; padding: 6px 8px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 13px; }
    .btn-row { display: flex; gap: 8px; margin: 10px 0; }
    button { cursor: pointer; border: none; border-radius: 4px; padding: 7px 14px; font-size: 13px; }
    .btn-primary { background: #2d8cf0; color: #fff; }
    .btn-ghost { background: #eef0f3; color: #333; }
    .group { border: 1px solid #ebedf0; border-left: 3px solid #2d8cf0; border-radius: 6px; padding: 10px 12px; margin-bottom: 12px; background: #fafcff; }
    .group-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .group-head h4 { margin: 0; font-size: 14px; color: #1f2d3d; }
    .btn-test { background: #67c23a; color: #fff; padding: 4px 12px; font-size: 12px; }
    .btn-test:hover { background: #5daf34; }
    .list { max-height: 70vh; overflow: auto; }
    .list-item { padding: 8px 10px; border: 1px solid #eee; border-radius: 4px; margin-bottom: 6px; cursor: pointer; font-size: 13px; }
    .list-item.active { border-color: #2d8cf0; background: #f0f7ff; }
    .badge { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 8px; margin-left: 6px; }
    .b-done { background: #e1f3d8; color: #529b2e; }
    .b-alarm { background: #fde2e2; color: #c0392b; }
    .b-timeout { background: #f5e1c0; color: #b8740c; }
    .b-sent { background: #e8e8e8; color: #777; }
    .detail-empty { color: #999; font-size: 14px; padding: 40px 0; text-align: center; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; min-width: 0; }
    .meta { font-size: 12px; color: #666; margin-bottom: 8px; word-break: break-all; }
    canvas { max-width: 100%; border: 1px solid #eee; background: #fafafa; border-radius: 4px; }
    pre { background: #f8f9fb; border: 1px solid #eee; border-radius: 4px; padding: 8px; font-size: 12px; max-height: 240px; overflow: auto; white-space: pre-wrap; word-break: break-all; }
    .logpanel { position: fixed; left: 0; right: 0; bottom: 0; height: 240px; background: #1e1e1e; color: #d4d4d4; display: none; flex-direction: column; font-family: Consolas, "Courier New", monospace; font-size: 12px; z-index: 50; border-top: 2px solid #2d8cf0; }
    .logpanel.show { display: flex; }
    .logpanel .lh { display: flex; align-items: center; gap: 10px; padding: 4px 10px; background: #111; color: #fff; font-size: 12px; }
    .logpanel .lh button { padding: 2px 10px; cursor: pointer; border: none; border-radius: 3px; background: #2d8cf0; color: #fff; }
    .logpanel pre { flex: 1; overflow: auto; margin: 0; padding: 8px 10px; white-space: pre-wrap; word-break: break-all; line-height: 1.5; background: #1e1e1e; border: none; color: #d4d4d4; }
  </style>
</head>
<body>
  <div class="topbar">
    <span>模型识别验证服务</span>
    <button id="logBtn" style="margin-left:auto;background:#2d8cf0;border:none;color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;">调试日志</button>
  </div>

  <div class="layout">
    <div class="col col-config">
      <h3>配置（按系统分组 · 运行期驻留内存 + 本地记忆）</h3>
      <form id="cfgForm"></form>
      <div class="btn-row">
        <button class="btn-primary" id="startBtn">开始验证</button>
        <button class="btn-ghost" id="stopBtn">停止</button>
      </div>
      <div id="status" style="font-size:13px;color:#555;"></div>
    </div>

    <div class="col col-list">
      <h3>图片列表</h3>
      <div class="list" id="imgList"></div>
    </div>

    <div class="col col-detail">
      <h3>识别结果</h3>
      <div id="detail"><div class="detail-empty">请选择左侧图片查看结果</div></div>
    </div>
  </div>

  <div class="logpanel" id="logPanel">
    <div class="lh">
      <span>调试日志（最近 200 条，每 2 秒自动刷新）</span>
      <button id="logRefresh">刷新</button>
      <button id="logClose">关闭</button>
    </div>
    <pre id="logBody"></pre>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
